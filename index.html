<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Wedding Photo Booth</title>
  </head>
  <body>
    <main class="app-shell">
      <section class="top-bar" aria-label="Wedding photo booth">
        <div>
          <p class="eyebrow" id="tagline">Wedding Photo Booth</p>
          <h1 id="coupleName">HAN &amp; YU</h1>
        </div>
        <div class="date-pill" id="weddingDate">2026.05.22</div>
      </section>

      <section class="stage" id="layoutScreen">
        <div class="intro-copy">
          <span class="tiny-label">FRAME SELECT</span>
          <h2>選一款今天的回憶</h2>
        </div>
        <div class="layout-grid" id="layoutGrid"></div>
      </section>

      <section class="stage hidden" id="cameraScreen">
        <div class="camera-panel">
          <div class="camera-preview-wrap" id="cameraPreviewWrap">
            <div class="camera-preview" id="cameraPreview">
              <video id="cameraVideo" autoplay playsinline muted></video>
              <div class="countdown hidden" id="countdown">3</div>
              <div class="shot-badge" id="shotBadge">1 / 4</div>
              <div class="flash-overlay" id="flashOverlay"></div>
            </div>
          </div>
          <aside class="side-panel">
            <span class="tiny-label" id="activeLayoutLabel">4格直列</span>
            <h2 id="cameraTitle">準備拍攝</h2>
            <p class="status-text" id="cameraStatus">看鏡頭，倒數後會自動拍下。</p>
            <button class="primary-btn" id="captureBtn" type="button">開始拍攝</button>
            <button class="ghost-btn" id="switchCameraBtn" type="button" aria-label="切換鏡頭">↺ 切換鏡頭</button>
          </aside>
        </div>
      </section>

      <section class="stage hidden" id="loadingScreen">
        <div class="loading-panel">
          <div class="loading-spinner"></div>
          <h2>資料處理中</h2>
          <p class="loading-message" id="loadingMessage">照片正在飛往愛情的彼岸…</p>
        </div>
      </section>

      <section class="stage hidden" id="resultScreen">
        <div class="result-panel">
          <div class="result-photo-wrap">
            <img id="resultImage" alt="完成的拍貼照片" />
          </div>
          <aside class="download-panel">
            <div class="download-info">
              <div class="download-info-text">
                <span class="tiny-label">READY TO SAVE</span>
                <h2>掃碼帶走這張照片</h2>
                <p class="status-text" id="uploadStatus">照片已存到伺服器。</p>
              </div>
              <canvas class="qr-canvas" id="qrCanvas" width="240" height="240" aria-label="下載 QR Code"></canvas>
            </div>
            <a class="download-link" id="downloadLink" target="_blank" rel="noreferrer">開啟下載連結</a>
            <button class="primary-btn" id="againBtn" type="button">再拍一組</button>
            <button class="ghost-btn" id="resultBackBtn" type="button">回版型選擇</button>
          </aside>
        </div>
      </section>
    </main>

    <canvas id="workCanvas" class="hidden"></canvas>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
